trigger:
- main

pool:
  vmImage: ubuntu‑latest

variables:
  terraformWorkingDir: '$(System.DefaultWorkingDirectory)/Pipelines/terraform_test'

steps:
# 1. Install Terraform (if not using a different task)
- task: TerraformInstaller@0
  displayName: 'Install Terraform'
  inputs:
    terraformVersion: 'latest'

# 2. Azure login + Terraform init/plan (uses service connection)
- task: AzureCLI@2
  displayName: 'Terraform Init & Plan'
  inputs:
    azureSubscription: 'AzureServiceConnection'   # 👈 service connection name
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      cd $(terraformWorkingDir)

      terraform init
      terraform plan -out=tfplan

      # Optional: confirm state file exists in Azure Storage
      az storage blob list \
        --account-name yourstorageaccount \
        --container-name tfstate \
        --auth-mode login

- task: AzureCLI@2
  displayName: 'Terraform Apply'
  inputs:
    azureSubscription: 'AzureServiceConnection'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      cd $(terraformWorkingDir)
      terraform apply -auto-approve
