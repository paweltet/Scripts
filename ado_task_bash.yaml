# Azure DevOps Pipeline Bash Task - Show Full Tokens
steps:
- task: Bash@3
  displayName: 'Get ServiceNow OAuth Token (Full Display)'
  inputs:
    targetType: 'inline'
    script: |
      tokenUrl="${ServiceNowInstanceUrl}/oauth_token.do"

      echo "Requesting token from: $tokenUrl"

      # Prepare form data
      response=$(curl -s -X POST "$tokenUrl" \
        -H "Content-Type: application/x-www-form-urlencoded" \
        -d "grant_type=password" \
        -d "client_id=${ServiceNowClientId}" \
        -d "client_secret=${ServiceNowClientSecret}" \
        -d "username=${ServiceNowUsername}" \
        -d "password=${ServiceNowPassword}" \
        -d "scope=offline_access")

      # Parse tokens using jq (ensure jq is available in the agent)
      access_token=$(echo "$response" | jq -r '.access_token')
      refresh_token=$(echo "$response" | jq -r '.refresh_token')

      # Display FULL tokens (visible in logs)
      echo -e "\033[0;36m=== SERVICE NOW TOKENS ===\033[0m"
      echo -e "\033[0;32mFULL Access Token:\033[0m  $access_token"
      echo -e "\033[1;33mFULL Refresh Token:\033[0m $refresh_token"
      echo "Access Token Length: ${#access_token}"
      echo "Refresh Token Length: ${#refresh_token}"
      echo -e "\033[0;36m========================\033[0m"

      # Store tokens as secure variables
      echo "##vso[task.setvariable variable=ServiceNowAccessToken;issecret=true]$access_token"
      echo "##vso[task.setvariable variable=ServiceNowRefreshToken;issecret=true]$refresh_token"

      echo "Tokens stored as pipeline variables successfully"
